background_opacity 0.8
background_blur 20

macos_option_as_alt yes

# Kitty will ignore the event to make macOS intercept it
# This is to use the native macOS Emoji Selector
map ctrl+cmd+space discard_event
# map ctrl+cmd+space no_op

map cmd+v paste_from_clipboard

# (window, menubar, all or nome)
macos_show_window_title_in window
macos_menubar_title_max_length 30
