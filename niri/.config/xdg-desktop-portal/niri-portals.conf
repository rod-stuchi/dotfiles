[preferred]
default=gnome;gtk;
org.freedesktop.impl.portal.Access=gtk;
org.freedesktop.impl.portal.Notification=gtk;
org.freedesktop.impl.portal.Secret=gnome-keyring;
# Route file picking to the GTK backend. The GNOME backend delegates
# FileChooser to nautilus, which crashes (SIGABRT in g_application_register)
# on this system, breaking file pickers in all browsers. GTK renders the
# dialog itself and works reliably.
org.freedesktop.impl.portal.FileChooser=gtk;
